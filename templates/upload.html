{{ define "title" }}{{.Title}}{{ end }}
{{ define "content" }}
<div class="content" style="background-color: #20A0F8;">
    <div id="upload-box" class="nes-container with-title is-centered" style="background-color: #FFFFFF;">
        <p class="title">Upload</p>
        <p>Upload a binary to be analyzed</p>
        <label class="nes-btn">
            <span>Select your file</span>
            <input id="upload-binary" type="file" onchange="uploadBinary()">
        </label>
        <br>
        <label style="margin-top: 20px;">
            <input id="training-data-checkbox" type="checkbox" class="nes-checkbox" checked />
            <span>Training Data</span>
        </label>
    </div>
    <div id="upload-message" class="nes-container with-title is-centered"
        style="display: none; background-color: #FFFFFF;">
        <p class="title">Binary Status</p>
        <p>Your binary is now being processed.</p>
    </div>
</div>

<script>
    document.getElementById("training-data-checkbox").checked = false;
    function uploadBinary() {
        let binaryFile = document.getElementById("upload-binary").files[0];
        let trainingData = document.getElementById("training-data-checkbox").checked;
        let formData = new FormData();
        formData.append("binaryFile", binaryFile);
        formData.append("trainingData", trainingData);
        fetch('/uploadBinary', {
            method: "POST",
            body: formData
        });
        var uploadMessage = document.getElementById("upload-message");
        var uploadBox = document.getElementById("upload-box");
        uploadMessage.style.display = "block";
        uploadBox.style.display = "none";
        setTimeout(function () {
            uploadMessage.style.display = "none";
            uploadBox.style.display = "block";
        }, 5000);
    }
</script>

{{ end }}
