{% extends "layout.html" %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', path='css/upload_style.css') }}">
<div class="content blue-bg">
    <div id="upload-box" class="nes-container with-title is-centered">
        <p class="title">// UPLOAD</p>

        <div>
            <label class="mt-2">
                <input id="generate-model-checkbox" type="checkbox" class="nes-checkbox" onclick="changeMlType()" />
                <span>Generate Model</span>
                {% if not allow_prediction %}
                <span class="info-icon" title="This will train a new ML model from your binary. Models must be generated before predictions can be made.">i</span>
                {% endif %}
            </label>

            <div id="training-config" class="nes-container with-title is-centered">
                <p class="title">MODEL CONFIGURATION</p>
                <div style="margin: 7%">
                    <div class="nes-field" style="margin: 7%">
                        <label for="model_name">Model Name</label>
                        <input type="text" id="model_name" class="nes-input" placeholder="ENTER NAME...">
                    </div>
                    <label for="ml_class_type">Select ML Class Type</label>
                    <div class="nes-select">
                        <select required id="ml_class_type">
                            <option value="1">Multi Class</option>
                        </select>
                    </div>
                </div>
            </div>

            {% if allow_prediction %}
            <div id="prediction-config" class="nes-container with-title is-centered" style="display: none;">
                <p class="title">PREDICTION CONFIGURATION</p>
                <div style="margin: 7%">
                    <div class="nes-field" style="margin: 7%">
                        <label for="task_name">Task Name</label>
                        <input type="text" id="task_name" class="nes-input" placeholder="ENTER TASK...">
                        <label for="prediction_model_selection">Select Model</label>
                        <div class="nes-select">
                            <select required id="prediction_model_selection">
                                <option value="" disabled selected hidden>MODEL NAME</option>
                                {% for model in models %}
                                <option selected>{{ model }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <label for="ml_class_type">Select ML Class Type</label>
                    <div class="nes-select">
                        <select required id="ml_class_type">
                            <option value="1">Multi Class</option>
                        </select>
                    </div>
                </div>
            </div>
            {% endif %}

            <div id="drop-zone" class="drop-zone">
                <span class="drop-zone-text">DRAG & DROP BINARY HERE</span>
                <span class="drop-zone-subtext">OR</span>
                <label class="nes-btn is-primary">
                    <span>SELECT FILE</span>
                    <input id="upload-binary" type="file" onchange="uploadBinary()">
                </label>
            </div>
        </div>
    </div>

    <div id="upload-message" class="nes-container with-title is-centered" style="display: none;">
        <p class="title">// BINARY STATUS</p>
        <p>[ PROCESSING... YOUR BINARY IS BEING ANALYZED ]</p>
    </div>
</div>

<script>
    function changeMlType() {
        const generate_model_box = document.getElementById("generate-model-checkbox");
        const prediction_div = document.getElementById("prediction-config");
        const training_div = document.getElementById("training-config");

        if (prediction_div == null) {
            generate_model_box.checked = true;
            training_div.style.display = "block";
            training_div.classList.remove("hidden");
            return;
        }

        if (generate_model_box.checked) {
            // Fade out prediction, fade in training
            prediction_div.classList.add("hidden");
            setTimeout(() => {
                prediction_div.style.display = "none";
                training_div.style.display = "block";
                // Small delay to allow display:block to apply before removing hidden
                setTimeout(() => {
                    training_div.classList.remove("hidden");
                }, 10);
            }, 300);
        } else {
            // Fade out training, fade in prediction
            training_div.classList.add("hidden");
            setTimeout(() => {
                training_div.style.display = "none";
                prediction_div.style.display = "block";
                // Small delay to allow display:block to apply before removing hidden
                setTimeout(() => {
                    prediction_div.classList.remove("hidden");
                }, 10);
            }, 300);
        }
    }

    const generate_model_box = document.getElementById("generate-model-checkbox");
    generate_model_box.checked = true;
    changeMlType();

    // Drag and drop functionality
    const dropZone = document.getElementById("drop-zone");
    const fileInput = document.getElementById("upload-binary");

    dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("drag-over");
    });

    dropZone.addEventListener("dragleave", (e) => {
        e.preventDefault();
        dropZone.classList.remove("drag-over");
    });

    dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("drag-over");
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            fileInput.files = files;
            uploadBinary();
        }
    });

    function uploadBinary() {
        var formData = new FormData();
        const selectedFile = document.getElementById('upload-binary').files[0];
        const trainingData = document.getElementById('generate-model-checkbox').checked;
        var modelName;

        if (trainingData) {
            modelName = document.getElementById('model_name').value;
        } else {
            modelName = document.getElementById('prediction_model_selection').value;
        }

        const taskElement = document.getElementById('task_name');
        if (taskElement != null && taskElement.value.trim() !== '') {
            const taskName = taskElement.value;
            formData.append('task_name', taskName);
        }
        const mlClassType = document.getElementById('ml_class_type').value;

        const url = "/api/v1/binaries/uploadBinary";

        formData.append('binary_file', selectedFile);
        formData.append('training_data', trainingData);
        formData.append('model_name', modelName);
        formData.append('ml_class_type', mlClassType);

        $.ajax({
            type: "POST",
            url: url,
            data: formData,
            processData: false,
            contentType: false,
            success: function (data, status, xhr) {
                var uploadMessage = document.getElementById("upload-message");
                var uploadBox = document.getElementById("upload-box");
                uploadMessage.style.display = "block";
                uploadBox.style.display = "none";
                setTimeout(function () {
                    uploadMessage.style.display = "none";
                    uploadBox.style.display = "block";
                    document.getElementById('generate-model-checkbox').checked = false;
                    document.getElementById('model_name').value = "";
                    document.getElementById('ml_class_type').value = "";
                    changeMlType();
                }, 5000);
            },
            error: function (data, status, xhr) {
                if (data.status == 400) {
                    window.location.href = '/error?type=uploadError';
                } else {
                    window.location.href = '/error';
                }
            },
            complete: function (xhr, textStatus) {
                console.log("upload complete");
            }
        });
    }
</script>
{% endblock %}
