<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://unpkg.com/nes.css/css/nes.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <title>{{ template "title" . }}</title>
    <div class="navbar">
        <div class="nav-links">
            <a href="/" style="color:#282828;" class="nav-links">
                <h1 style="display: inline;">Glyph</h1>
            </a>
            <a href="/getSymbols" class="nav-links">Get
                Symbols</a>
            <a href="/uploadBinary" class="nav-links">Upload</a>
        </div>
    </div>
</head>

<body>
    {{ template "content" . }}
</body>

<style>
    .nav-links {
        width: 80%;
        height: 60px;
        margin: 10px;
        padding: 5px;
    }

    .navbar {
        width: 100%;
        height: 10%;
        background-color: #F8C8A0;
        border-bottom: 4px solid #282828;
        display: flex;
        margin: auto;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: left;
        align-items: center;
    }

    .content {
        width: 50%;
        height: 90%;
        margin: auto;
        padding: 5%;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
    }

    .blue-bg {
        background-color: #20A0F8;
    }

    .white-bg {
        background-color: #FFFFFF;
    }

    html,
    body {
        width: 100%;
        height: 100%;
        margin: 0;
        background-color: #20A0F8;
    }

    .nes-table-responsive {
        width: 80%;
    }

    .center-contents {
        display: flex;
        align-items: center;
        justify-content: center;
        margin: auto;
    }

    .th {
        color: #282828;
    }

    .file-name {
        margin: auto;
    }
</style>

</html>
