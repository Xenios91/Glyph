{% extends "layout.html" %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', path='css/main_style.css') }}">
{% endblock head %}
{% block content %}
<div class="content blue-bg">
    <div class="cyber-container with-title is-centered white-bg main-card" role="region" aria-labelledby="glyph-title">
        <div class="hero-section">
            <h1 class="cyber-title" id="glyph-title">GLYPH</h1>
        </div>
        
        <div class="description-box">
            <p class="cyber-text is-primary">
                A binary analysis tool for <br>
                <span class="cyber-text is-error">fingerprinting functions</span>
            </p>
        </div>
        
        <div class="action-area">
            <a href="/login" class="cyber-btn is-primary start-btn" role="button" aria-label="Start binary analysis">
                [ START ]
            </a>
            <p class="blink_text mt-2" style="font-size: 1.0rem;">PRESS START TO BEGIN</p>
        </div>
        
        <hr class="cyber-hr">
        
    </div>
</div>

{% endblock content %}
