{{ define "title" }}{{.Title}}{{ end }}
{{ define "content" }}

<div class="uk-flex uk-flex-column uk-width-1-3 uk-align-center">
    <div class="uk-margin-small-bottom uk-margin-medium-top uk-text-center">
        <h1 class="uk-heading-large" style="font-family: 'Press Start 2P', cursive;">Glyph</h1>
        <p class="uk-text-medium uk-text-center" style="color:#FFFFFF">A binary analysis tool for fingerprinting functions</p>
    </div>
    <div>
        <p class="uk-text-medium blink_text uk-text-center"><a href="/uploadBinary" style="color: #FFFFFF">Click here to start</a></p>
    </div>
</div>

<style>
    .blink_text {

        animation: 2s blinker linear infinite;
        -webkit-animation: 2s blinker linear infinite;
        -moz-animation: 2s blinker linear infinite;
    }

    @-moz-keyframes blinker {
        0% {
            opacity: 1.0;
        }

        50% {
            opacity: 0.0;
        }

        100% {
            opacity: 1.0;
        }
    }

    @-webkit-keyframes blinker {
        0% {
            opacity: 1.0;
        }

        50% {
            opacity: 0.0;
        }

        100% {
            opacity: 1.0;
        }
    }

    @keyframes blinker {
        0% {
            opacity: 1.0;
        }

        50% {
            opacity: 0.0;
        }

        100% {
            opacity: 1.0;
        }
    }
</style>
{{ end }}
