{{ define "title" }}{{.Title}}{{ end }}
{{ define "content" }}

<div class="container">
    <div class="jumbotron jumbotron-fluid bg-white">
        <div class="d-flex align-items-center flex-column">
            <h1 class="display-2" style="font-family: 'Rakkas', cursive;">Glyph</h1>
            <p class="lead p-2">A binary analysis tool for fingerprinting functions.</p>
        </div>
    </div>
    <div class="d-flex align-items-center flex-column">
        <form enctype="multipart/form-data" action="/uploadBinary" method="post" id="upload-form"
            onsubmit="submitForm(this)">
            <div class="input-group p-2">
                <div class="input-group-prepend">
                    <button id="upload-button" class="btn btn-outline-secondary" type="submit"><svg width="1em"
                            height="1em" viewBox="0 0 16 16" class="bi bi-upload" fill="currentColor"
                            xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd"
                                d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z" />
                            <path fill-rule="evenodd"
                                d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z" />
                        </svg></button>
                </div>
                <div class="custom-file">
                    <input type="file" class="custom-file-input rounded" id="binary-upload"
                        aria-describedby="inputGroupFileAddon01" name="binaryFile" data-toggle="tooltip"
                        data-placement="top" title="Max File Size 500MB">
                    <label class="custom-file-label" for="binary-upload">Choose Binary To Analyze...</label>
                </div>
            </div>
            <div class="pl-5 mt-2">
                <input type="checkbox" class="form-check-input" id="training-data-check" name="training-data">
                <label class="form-check-label" for="training-data-check" data-toggle="tooltip" data-placement="top"
                    title="Process this file as a training set"> Training Data </label>
            </div>
        </form>
    </div>
</div>
{{ end }}
