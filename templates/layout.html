<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="csrf-token" content="{{ get_csrf_token(request) | default('', true) }}">
    
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self'; 
                   script-src 'self' 'unsafe-inline' https://code.jquery.com https://unpkg.com; 
                   style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; 
                   font-src 'self' https://fonts.gstatic.com; 
                   img-src 'self' data: https:; 
                   connect-src 'self'; 
                   frame-ancestors 'none';">
    
    <link rel="shortcut icon" href="{{ url_for('static', path='favicon.ico') }}">
    
    <!-- Primary fonts with display swap for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@500;600;700&family=Source+Code+Pro:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <title>{{ title | e }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    {%- block head %}{%- endblock head %}
</head>
<script>
    (function () {
        const path = window.location.pathname;
        document.querySelectorAll('.nav-links a').forEach(function (link) {
            const href = link.getAttribute('href');
            if (href && path.startsWith(href) && href !== '/') {
                link.classList.add('nav-active');
            }
        });
    })();
</script>

<body>

    {% include 'components/background.html' %}

    {% include 'components/navbar.html' %}

    <!-- Page content -->
    <div class="page-content" role="main">
        {%- block content %}{%- endblock content %}
    </div>

    {% include 'components/scripts.html' %}

    {%- block scripts %}{%- endblock scripts %}

</body>
</html>
