{% extends "layout.html" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', path='css/auth_style.css') }}">
{% endblock %}

{% block content %}
<div class="auth-content">
    <div class="auth-card cyber-container with-title" role="region" aria-labelledby="register-title">
        <h2 class="auth-title" id="register-title">REGISTER</h2>
        
        <div id="register-error" class="auth-error" role="alert" aria-live="assertive" style="display: none;"></div>
        
        <form id="registerForm" method="POST" novalidate>
            <input type="hidden" name="csrf_token" value="{{ get_csrf_token(request) }}">
            
            <div class="auth-form-group">
                <label for="username" class="auth-form-label">USERNAME</label>
                <input type="text" id="username" name="username" class="auth-form-input" required minlength="3" maxlength="64" placeholder="Enter username" aria-required="true">
                <span class="field-hint">3-64 characters</span>
            </div>
            
            <div class="auth-form-group">
                <label for="email" class="auth-form-label">EMAIL</label>
                <input type="email" id="email" name="email" class="auth-form-input" required placeholder="Enter email" aria-required="true">
            </div>
            
            <div class="auth-form-group">
                <label for="full_name" class="auth-form-label">FULL NAME (OPTIONAL)</label>
                <input type="text" id="full_name" name="full_name" class="auth-form-input" maxlength="128" placeholder="Enter full name">
            </div>
            
            <div class="auth-form-group">
                <label for="password" class="auth-form-label">PASSWORD</label>
                <input type="password" id="password" name="password" class="auth-form-input" required minlength="8" placeholder="Enter password" aria-required="true">
                <span class="field-hint">Minimum 8 characters</span>
            </div>
            
            <div class="auth-form-group">
                <label for="confirm_password" class="auth-form-label">CONFIRM PASSWORD</label>
                <input type="password" id="confirm_password" name="confirm_password" class="auth-form-input" required minlength="8" placeholder="Confirm password" aria-required="true">
            </div>
            
            <button type="submit" class="auth-btn" id="register-submit-btn">
                [ REGISTER ]
            </button>
        </form>
        
        <div class="auth-links">
            <p>Already have an account? <a href="/login">LOGIN HERE</a></p>
        </div>
    </div>
</div>

<script>
/**
 * Validate email format
 * @param {string} email - Email to validate
 * @returns {boolean} True if valid email format
 */
function isValidEmail(email) {
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return emailRegex.test(email);
}

/**
 * Initialize register form with validation and submission handling
 */
function initRegisterForm() {
    const form = document.getElementById('registerForm');
    const usernameInput = document.getElementById('username');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirm_password');
    const submitBtn = document.getElementById('register-submit-btn');
    const errorDiv = document.getElementById('register-error');
    
    if (!form) return;
    
    // Real-time validation for username
    usernameInput.addEventListener('blur', function() {
        if (this.value.length < 3) {
            this.classList.add('is-error');
            this.setAttribute('aria-invalid', 'true');
        } else {
            this.classList.remove('is-error');
            this.setAttribute('aria-invalid', 'false');
        }
    });
    
    usernameInput.addEventListener('input', function() {
        if (this.classList.contains('is-error')) {
            this.classList.remove('is-error');
            this.setAttribute('aria-invalid', 'false');
        }
    });
    
    // Real-time validation for email
    emailInput.addEventListener('blur', function() {
        if (this.value && !isValidEmail(this.value)) {
            this.classList.add('is-error');
            this.setAttribute('aria-invalid', 'true');
        } else {
            this.classList.remove('is-error');
            this.setAttribute('aria-invalid', 'false');
        }
    });
    
    emailInput.addEventListener('input', function() {
        if (this.classList.contains('is-error')) {
            this.classList.remove('is-error');
            this.setAttribute('aria-invalid', 'false');
        }
    });
    
    // Real-time validation for password
    passwordInput.addEventListener('blur', function() {
        if (this.value.length < 8) {
            this.classList.add('is-error');
            this.setAttribute('aria-invalid', 'true');
        } else {
            this.classList.remove('is-error');
            this.setAttribute('aria-invalid', 'false');
        }
    });
    
    passwordInput.addEventListener('input', function() {
        if (this.classList.contains('is-error')) {
            this.classList.remove('is-error');
            this.setAttribute('aria-invalid', 'false');
        }
        // Check password match on input
        checkPasswordMatch();
    });
    
    // Real-time validation for confirm password
    confirmPasswordInput.addEventListener('input', checkPasswordMatch);
    
    function checkPasswordMatch() {
        if (confirmPasswordInput.value && passwordInput.value !== confirmPasswordInput.value) {
            confirmPasswordInput.classList.add('is-error');
            confirmPasswordInput.setAttribute('aria-invalid', 'true');
        } else if (confirmPasswordInput.value) {
            confirmPasswordInput.classList.remove('is-error');
            confirmPasswordInput.setAttribute('aria-invalid', 'false');
        }
    }
    
    // Form submission
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Validate before submission
        if (usernameInput.value.length < 3) {
            usernameInput.classList.add('is-error');
            Toast.error('Username must be at least 3 characters');
            usernameInput.focus();
            return;
        }
        
        if (!isValidEmail(emailInput.value)) {
            emailInput.classList.add('is-error');
            Toast.error('Please enter a valid email address');
            emailInput.focus();
            return;
        }
        
        if (passwordInput.value.length < 8) {
            passwordInput.classList.add('is-error');
            Toast.error('Password must be at least 8 characters');
            passwordInput.focus();
            return;
        }
        
        if (passwordInput.value !== confirmPasswordInput.value) {
            confirmPasswordInput.classList.add('is-error');
            Toast.error('Passwords do not match');
            confirmPasswordInput.focus();
            return;
        }
        
        // Set loading state
        submitBtn.disabled = true;
        submitBtn.textContent = 'REGISTER...';
        
        const formData = new FormData(form);
        const data = {
            username: formData.get('username'),
            email: formData.get('email'),
            full_name: formData.get('full_name') || null,
            password: passwordInput.value
        };
        
        try {
            const response = await fetch('/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-Token': formData.get('csrf_token')
                },
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                Toast.success('Registration successful! Redirecting to login...');
                // Redirect to login page
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1000);
            } else {
                const error = await response.json();
                const errorMessage = error.detail || 'Registration failed';
                showError(errorMessage);
                Toast.error(errorMessage);
            }
        } catch (err) {
            console.error('Registration error:', err);
            showError('Network error. Please try again.');
            Toast.error('Network error. Please try again.');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = '[ REGISTER ]';
        }
    });
    
    function showError(message) {
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 5000);
    }
}

// Initialize when DOM is ready
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initRegisterForm);
} else {
    initRegisterForm();
}
</script>
{% endblock %}
