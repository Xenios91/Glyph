{% extends "layout.html" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', path='css/auth_style.css') }}">
{% endblock %}

{% block content %}
<div class="auth-content">
    <div class="auth-card nes-container with-title">
        <h2 class="auth-title">REGISTER</h2>
        
        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}
        
        {% if success %}
        <div class="auth-success">{{ success }}</div>
        {% endif %}
        
        <form id="registerForm" method="POST">
            <input type="hidden" name="csrf_token" value="{{ get_csrf_token(request) }}">
            
            <div class="auth-form-group">
                <label for="username" class="auth-form-label">USERNAME</label>
                <input type="text" id="username" name="username" class="auth-form-input" required minlength="3" maxlength="64" placeholder="Enter username">
            </div>
            
            <div class="auth-form-group">
                <label for="email" class="auth-form-label">EMAIL</label>
                <input type="email" id="email" name="email" class="auth-form-input" required placeholder="Enter email">
            </div>
            
            <div class="auth-form-group">
                <label for="full_name" class="auth-form-label">FULL NAME (OPTIONAL)</label>
                <input type="text" id="full_name" name="full_name" class="auth-form-input" maxlength="128" placeholder="Enter full name">
            </div>
            
            <div class="auth-form-group">
                <label for="password" class="auth-form-label">PASSWORD</label>
                <input type="password" id="password" name="password" class="auth-form-input" required minlength="8" placeholder="Enter password">
            </div>
            
            <div class="auth-form-group">
                <label for="confirm_password" class="auth-form-label">CONFIRM PASSWORD</label>
                <input type="password" id="confirm_password" name="confirm_password" class="auth-form-input" required minlength="8" placeholder="Confirm password">
            </div>
            
            <button type="submit" class="auth-btn">
                [ REGISTER ]
            </button>
        </form>
        
        <div class="auth-links">
            <p>Already have an account? <a href="/login">LOGIN HERE</a></p>
        </div>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const formData = new FormData(e.target);
    const password = formData.get('password');
    const confirmPassword = formData.get('confirm_password');
    
    if (password !== confirmPassword) {
        document.querySelector('.auth-error')?.remove();
        const errorDiv = document.createElement('div');
        errorDiv.className = 'auth-error';
        errorDiv.textContent = 'Passwords do not match';
        e.target.insertBefore(errorDiv, e.target.firstChild);
        return;
    }
    
    const data = {
        username: formData.get('username'),
        email: formData.get('email'),
        full_name: formData.get('full_name') || null,
        password: password
    };
    
    try {
        const response = await fetch('/auth/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-Token': formData.get('csrf_token')
            },
            body: JSON.stringify(data)
        });
        
        if (response.ok) {
            // Redirect to login page
            window.location.href = '/login';
        } else {
            const error = await response.json();
            document.querySelector('.auth-error')?.remove();
            const errorDiv = document.createElement('div');
            errorDiv.className = 'auth-error';
            errorDiv.textContent = error.detail || 'Registration failed';
            e.target.insertBefore(errorDiv, e.target.firstChild);
        }
    } catch (err) {
        console.error('Registration error:', err);
    }
});
</script>
{% endblock %}
