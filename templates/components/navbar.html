{# Navbar component with mobile responsive support and ARIA labels #}
<nav class="navbar" role="navigation" aria-label="Main navigation">
    <a href="/" class="nav-logo" aria-label="Glyph home">
        <h1>GLYPH</h1>
    </a>
    
    <!-- Mobile hamburger menu toggle -->
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="nav-links">
        <span></span>
        <span></span>
        <span></span>
    </button>
    
    <div class="nav-links" id="nav-links">
        <a href="/getModels" aria-label="View Models">VIEW MODELS</a>
        <a href="/getPredictions" aria-label="View Predictions">PREDICTIONS</a>
        <a href="/uploadBinary" aria-label="Upload Binary">UPLOAD</a>
        <a href="/config" aria-label="Configuration">CONFIG</a>
        {% if user %}
        <a href="/profile" aria-label="View Profile">{{ user.username }}</a>
        <a href="/auth/logout" aria-label="Logout">LOGOUT</a>
        {% else %}
        <a href="/login" aria-label="Login">LOGIN</a>
        <a href="/register" aria-label="Register">REGISTER</a>
        {% endif %}
    </div>
</nav>

<script>
// Mobile navigation toggle
(function() {
    const navToggle = document.getElementById('nav-toggle');
    const navLinks = document.getElementById('nav-links');
    
    if (navToggle && navLinks) {
        navToggle.addEventListener('click', function() {
            const isExpanded = navToggle.getAttribute('aria-expanded') === 'true';
            navToggle.setAttribute('aria-expanded', !isExpanded);
            navToggle.classList.toggle('is-active');
            navLinks.classList.toggle('is-open');
        });
        
        // Close menu when clicking outside
        document.addEventListener('click', function(e) {
            if (!navToggle.contains(e.target) && !navLinks.contains(e.target)) {
                navToggle.setAttribute('aria-expanded', 'false');
                navToggle.classList.remove('is-active');
                navLinks.classList.remove('is-open');
            }
        });
        
        // Close menu on escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                navToggle.setAttribute('aria-expanded', 'false');
                navToggle.classList.remove('is-active');
                navLinks.classList.remove('is-open');
                navToggle.focus();
            }
        });
    }
})();
</script>
