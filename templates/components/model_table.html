{# Model Table Component
# Usage:
#   {% set click_handler = 'goToURL' %}
#   {% include 'components/model_table.html' %}
#}
<div class="cyber-table-responsive">
    <blockquote>
        <table class="cyber-table is-bordered is-centered model-table" data-click-handler="{{ click_handler | default('') }}">
            <thead>
                <tr>
                    <th scope="col" class="checkbox-column">
                        <input type="checkbox" id="select-all-models" class="model-select-all" aria-label="Select all models">
                    </th>
                    <th scope="col">MODEL NAME</th>
                    <th scope="col">STATUS</th>
                </tr>
            </thead>
            <tbody>
                {% for model, status in models.items() %}
                <tr class="hover-row"
                    tabindex="0"
                    role="row"
                    data-model-name="{{ model | e }}"
                    aria-label="Model: {{ model | e }}, Status: {{ status | e }}">
                    <td class="checkbox-cell">
                        <input type="checkbox" class="model-select-checkbox" data-model-name="{{ model | e }}" aria-label="Select {{ model | e }}">
                    </td>
                    <td class="model-name-cell">{{ model }}</td>
                    <td class="model-status-cell status-{{ status | replace(' ', '-') | lower }}"
                        {% if status == 'complete' %}data-status="complete"
                        {% elif status == 'N/A' %}data-status="na"
                        {% else %}data-status="pending"{% endif %}>
                        {{ status }}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </blockquote>
</div>
