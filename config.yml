cpu_cores: 4
jwt_secret_key: change-me-in-production
logging:
  console:
    colorize: true
    enabled: true
    level: INFO
  file:
    path: logs/glyph.log
    retention: 10 days
    rotation: 50 MB
  format: json
  level: INFO
  module_levels:
    app.auth: INFO
    app.database: WARNING
    app.processing: DEBUG
    uvicorn: INFO
  request_tracing:
    enabled: true
    header_name: X-Request-ID
max_file_size_mb: 100
prediction_probability_threshold: 50.0
