prediction_probability_threshold: 50.0 # must be a value between 0-100

max_file_size_mb: 512 # maximum file size in MB for uploaded binaries
cpu_cores: 2 # number of CPU cores to use for processing (must be between 1 and 32)

# Logging configuration
# Uses Loguru (https://loguru.readthedocs.io/) for modern Python logging
#
# Environment Variables (override config.yml settings):
#   LOGURU_LEVEL     - Override log level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
#   LOGURU_FORMAT    - Override log format (json, text)
#   LOGURU_DIAGNOSE  - Enable/disable variable diagnosis in exceptions (YES/NO)
#   LOGURU_COLORIZE  - Enable/disable colorization (YES/NO)
#   GLYPH_LOG_BEST_PRACTICE - Enable logging best practice validation (true/false)
#
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: json  # json or text
  file:
    path: logs/glyph.log
    max_size_mb: 50
    backup_count: 10
    rotate: size  # time or size
    time_interval: midnight  # midnight, daily, weekly, monthly
  console:
    enabled: true
    level: INFO
    colorize: true
  request_tracing:
    enabled: true
    header_name: X-Request-ID
  # Per-module log level overrides
  module_levels:
    app.database: WARNING
    app.auth: INFO
    app.processing: DEBUG
    uvicorn: INFO
  # Rate limiting to prevent log spam
  rate_limit:
    enabled: false
    max_messages: 10
    period: 60.0
    max_keys: 1000
  # Async logging for non-blocking I/O
  async_logging:
    enabled: false
    max_queue_size: 1000
  # Log sampling for high-volume scenarios
  sampling:
    enabled: false
    rate: 0.1  # Log 10% of messages when enabled
